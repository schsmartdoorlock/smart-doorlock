<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순천향대학교 사물인터넷학과 출입 인증 시스템</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import QRCode from "https://cdn.skypack.dev/qrcode";

const firebaseConfig = {
  apiKey: "AIzaSyD8Ze-40qNj-FMDjCu2XSlhdc57oDpUs-M",
  authDomain: "smart-doorlock-ed630.firebaseapp.com",
  projectId: "smart-doorlock-ed630",
  storageBucket: "smart-doorlock-ed630.firebasestorage.app",
  messagingSenderId: "319771642912",
  appId: "1:319771642912:web:18a412384f1792ad2d8045"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEventListener("DOMContentLoaded", () => {
  const nameInput = document.getElementById("name");
  const idInput = document.getElementById("id");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  const result = document.getElementById("result");
  const qrCanvas = document.getElementById("qr");

  btn.addEventListener("click", async () => {
    msg.innerText = "";
    result.style.display = "none";

    const student_name = nameInput.value.trim();
    const student_id = idInput.value.trim();

    if (!student_name) {
      msg.innerText = "이름을 입력하세요";
      return;
    }

    if (!/^\d{8}$/.test(student_id)) {
      msg.innerText = "학번은 8자리 숫자만 입력 가능합니다";
      return;
    }

    try {
      const q = query(collection(db, "students"), where("name", "==", student_name));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        msg.innerText = "학생정보가 조회되지 않습니다";
        return;
      }

      let found = false;
      snapshot.forEach(doc => {
        if (doc.id === student_id) found = true;
      });

      if (!found) {
        msg.innerText = "학번이 일치하지 않습니다";
        return;
      }

      const code = Math.floor(1000 + Math.random() * 9000).toString();

      const qrData = {
        student_id: student_id,
        code: code
      };

      await QRCode.toCanvas(qrCanvas, JSON.stringify(qrData), {
        width: 220,
        color: {
          dark: "#000000",
          light: "#ffffff"
        }
      });

      await addDoc(collection(db, "access_codes"), {
        student_id,
        name: student_name,
        code,
        qr_data: JSON.stringify(qrData),
        created_at: serverTimestamp(),
        is_used: false
      });

      document.getElementById("rname").innerText = student_name;
      document.getElementById("rcode").innerText = code;

      result.style.display = "block";
      msg.innerText = student_name + " 학생 인증 완료 되었습니다. QR 또는 비밀번호로 출입하세요.";
    } catch (e) {
      console.error(e);
      msg.innerText = "오류가 발생했습니다";
    }
  });

  idInput.addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, "").slice(0, 8);
  });
});
</script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.card {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  height: 45px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
  font-size: 16px;
}

#result {
  display: none;
  text-align: center;
  margin-top: 20px;
}

canvas {
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">
  <h2>순천향대학교 사물인터넷학과 출입 인증 시스템</h2>

  <input id="name" placeholder="이름 입력">
  <input id="id" placeholder="학번 (8자리)" inputmode="numeric">

  <button id="btn">인증하기</button>

  <p id="msg" style="color:red;"></p>

  <div id="result">
    <h3 id="rname"></h3>
    <h2 id="rcode"></h2>
    <canvas id="qr"></canvas>
  </div>
</div>

</body>
</html>
