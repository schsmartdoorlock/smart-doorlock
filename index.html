<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순천향대학교 사물인터넷학과 출입 인증 시스템</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import QRCode from "https://cdn.skypack.dev/qrcode";

const firebaseConfig = {
  apiKey: "AIzaSyD8Ze-40qNj-FMDjCu2XSlhdc57oDpUs-M",
  authDomain: "smart-doorlock-ed630.firebaseapp.com",
  projectId: "smart-doorlock-ed630",
  storageBucket: "smart-doorlock-ed630.firebasestorage.app",
  messagingSenderId: "319771642912",
  appId: "1:319771642912:web:18a412384f1792ad2d8045"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEventListener("DOMContentLoaded", () => {
  const nameInput = document.getElementById("name");
  const idInput = document.getElementById("id");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  const result = document.getElementById("result");
  const qrCanvas = document.getElementById("qr");

  btn.addEventListener("click", async () => {

    msg.innerText = "";
    result.style.display = "none";

    const student_name = nameInput.value.trim();
    const student_id = idInput.value.trim();

    if (!student_name) {
      msg.innerText = "이름을 입력하세요";
      return;
    }

    if (!/^\d{8}$/.test(student_id)) {
      msg.innerText = "학번은 8자리 숫자";
      return;
    }

    try {
      const q = query(collection(db, "students"), where("name", "==", student_name));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        msg.innerText = "학생정보 없음";
        return;
      }

      let found = false;
      snapshot.forEach(doc => {
        if (doc.id === student_id) found = true;
      });

      if (!found) {
        msg.innerText = "학번 불일치";
        return;
      }

      const code = Math.floor(1000 + Math.random() * 9000).toString();

      const qrData = {
        student_id,
        code
      };

      await QRCode.toCanvas(qrCanvas, JSON.stringify(qrData), {
        width: 200,
        color: { dark: "#000", light: "#fff" }
      });

      await addDoc(collection(db, "access_codes"), {
        student_id,
        name: student_name,
        code,
        qr_data: JSON.stringify(qrData),
        created_at: serverTimestamp(),
        is_used: false
      });

      document.getElementById("rname").innerText = student_name;
      document.getElementById("rcode").innerText = code;

      result.style.display = "block";
      msg.innerText = "인증 완료";

    } catch (e) {
      msg.innerText = "오류 발생";
    }
  });

  idInput.addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, "").slice(0,8);
  });
});
</script>

<style>
body {
  margin:0;
  font-family: 'Apple SD Gothic Neo', sans-serif;
  background: linear-gradient(135deg, #111, #333);
  color:white;
}

.container {
  max-width:400px;
  margin:40px auto;
  padding:20px;
}

.title {
  font-size:20px;
  font-weight:600;
  margin-bottom:20px;
  line-height:1.4;
}

.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input {
  width:100%;
  height:50px;
  margin-bottom:12px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
}

button {
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  background:black;
  color:white;
  font-size:16px;
  font-weight:600;
}

#msg {
  margin-top:10px;
  color:red;
  font-size:14px;
}

#result {
  display:none;
  text-align:center;
  margin-top:20px;
}

#rcode {
  font-size:32px;
  font-weight:bold;
  margin:10px 0;
}

canvas {
  margin-top:10px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="title">
    순천향대학교<br>
    사물인터넷학과 출입 인증 시스템
  </div>

  <div class="card">
    <input id="name" placeholder="이름 입력">
    <input id="id" placeholder="학번 (8자리)" inputmode="numeric">
    <button id="btn">인증하기</button>

    <p id="msg"></p>

    <div id="result">
      <div id="rname"></div>
      <div id="rcode"></div>
      <canvas id="qr"></canvas>
    </div>
  </div>

</div>

</body>
</html>
