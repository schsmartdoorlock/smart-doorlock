<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순천향대학교 사물인터넷학과 출입 인증 시스템</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import QRCode from "https://cdn.skypack.dev/qrcode";

const firebaseConfig = {
  apiKey: "AIzaSyD8Ze-40qNj-FMDjCu2XSlhdc57oDpUs-M",
  authDomain: "smart-doorlock-ed630.firebaseapp.com",
  projectId: "smart-doorlock-ed630",
  storageBucket: "smart-doorlock-ed630.firebasestorage.app",
  messagingSenderId: "319771642912",
  appId: "1:319771642912:web:18a412384f1792ad2d8045"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 좌석 생성 */
window.seedSeats = async function () {
  for (let n = 1; n <= 48; n++) {
    let status = (n >= 46) ? "disabled" : "available";

    await setDoc(doc(db, "seats", `seat_${String(n).padStart(2,"0")}`), {
      seat_number: n,
      status: status
    });
  }
  alert("좌석 생성 완료");
};

window.addEventListener("DOMContentLoaded", () => {
  const nameInput = document.getElementById("name");
  const idInput = document.getElementById("id");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  const result = document.getElementById("result");
  const qrCanvas = document.getElementById("qr");

  btn.addEventListener("click", async () => {

    msg.innerText = "";
    result.style.display = "none";

    const name = nameInput.value.trim();
    const id = idInput.value.trim();

    if (!name) {
      msg.innerText = "이름 입력";
      return;
    }

    if (!/^\d{8}$/.test(id)) {
      msg.innerText = "학번 8자리 숫자";
      return;
    }

    try {
      const q = query(collection(db, "students"), where("name", "==", name));
      const snap = await getDocs(q);

      if (snap.empty) {
        msg.innerText = "학생 없음";
        return;
      }

      let ok = false;
      snap.forEach(d => {
        if (d.id === id) ok = true;
      });

      if (!ok) {
        msg.innerText = "학번 불일치";
        return;
      }

      const code = Math.floor(1000 + Math.random()*9000).toString();

      await QRCode.toCanvas(qrCanvas, JSON.stringify({id, code}), {
        width:200
      });

      await addDoc(collection(db,"access_codes"),{
        student_id:id,
        name:name,
        code:code,
        created_at:serverTimestamp()
      });

      document.getElementById("rname").innerText = name;
      document.getElementById("rcode").innerText = code;

      result.style.display = "block";
      msg.innerText = "인증 완료";

    } catch(e){
      msg.innerText = "오류";
    }
  });

  idInput.addEventListener("input",(e)=>{
    e.target.value = e.target.value.replace(/[^0-9]/g,"").slice(0,8);
  });

});
</script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.card {
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input {
  width:100%;
  height:42px;
  margin-bottom:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

button {
  width:100%;
  height:45px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  font-size:15px;
}

#result {
  display:none;
  text-align:center;
  margin-top:20px;
}

canvas {
  margin-top:10px;
}
</style>

</head>

<body>

<div class="card">
  <h2>순천향대학교 사물인터넷학과 출입 인증 시스템</h2>

  <input id="name" placeholder="이름 입력">
  <input id="id" placeholder="학번 (8자리)" inputmode="numeric">

  <button id="btn">인증하기</button>

  <p id="msg" style="color:red;"></p>

  <div id="result">
    <h3 id="rname"></h3>
    <h2 id="rcode"></h2>
    <canvas id="qr"></canvas>
  </div>
</div>

</body>
</html>
