<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>순천향대학교 사물인터넷학과 출입 인증 시스템</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      addDoc,
      serverTimestamp,
      doc,
      setDoc,
      updateDoc,
      writeBatch,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import QRCode from "https://cdn.skypack.dev/qrcode";

    const firebaseConfig = {
      apiKey: "AIzaSyD8Ze-40qNj-FMDjCu2XSlhdc57oDpUs-M",
      authDomain: "smart-doorlock-ed630.firebaseapp.com",
      projectId: "smart-doorlock-ed630",
      storageBucket: "smart-doorlock-ed630.firebasestorage.app",
      messagingSenderId: "319771642912",
      appId: "1:319771642912:web:18a412384f1792ad2d8045"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentStudent = null;
    let seatsCache = [];
    let selectedSeatId = null;

    async function seedSeats() {
      const batch = writeBatch(db);

      for (let n = 1; n <= 48; n++) {
        const ref = doc(db, "seats", `seat_${String(n).padStart(2, "0")}`);
        batch.delete(ref);
      }

      for (let n = 1; n <= 45; n++) {
        const localIndex = n <= 24 ? n : n - 24;
        const section = n <= 24 ? "A" : "B";
        const row = Math.floor((localIndex - 1) / 4) + 1;
        const col = ((localIndex - 1) % 4) + 1;

        const ref = doc(db, "seats", `seat_${String(n).padStart(2, "0")}`);
        batch.set(ref, {
          seat_number: n,
          section,
          row,
          col,
          status: "available"
        });
      }

      await batch.commit();
    }

    async function ensureSeatsInitialized() {
      const snap = await getDocs(collection(db, "seats"));

      if (snap.empty) {
        await seedSeats();
        return;
      }

      let needsReset = false;

      if (snap.size !== 45) needsReset = true;

      snap.forEach((d) => {
        const data = d.data();
        if (
          typeof data.seat_number !== "number" ||
          !data.section ||
          typeof data.row !== "number" ||
          typeof data.col !== "number" ||
          !data.status
        ) {
          needsReset = true;
        }
      });

      if (needsReset) {
        await seedSeats();
      }
    }

    function updateSeatStatsAndRender() {
      const total = seatsCache.length;
      const used = seatsCache.filter((seat) => seat.status === "in_use").length;
      const remaining = seatsCache.filter((seat) => seat.status === "available").length;
      const rate = total === 0 ? 0 : Math.round((used / total) * 100);

      document.getElementById("totalSeats").innerText = `${total}석`;
      document.getElementById("remainingSeats").innerText = `${remaining}석`;
      document.getElementById("occupancyRate").innerText = `${rate}%`;

      renderSeats();
    }

    function buildSectionLayout(sectionName) {
      const sectionSeats = seatsCache
        .filter((seat) => seat.section === sectionName)
        .sort((a, b) => a.seat_number - b.seat_number);

      const maxRows = 6;
      const maxCols = 4;
      const map = new Map();

      sectionSeats.forEach((seat) => {
        map.set(`${seat.row}-${seat.col}`, seat);
      });

      const fragment = document.createDocumentFragment();

      for (let row = 1; row <= maxRows; row++) {
        for (let col = 1; col <= maxCols; col++) {
          const key = `${row}-${col}`;
          const seat = map.get(key);

          if (!seat) {
            const empty = document.createElement("div");
            empty.className = "seat-empty";
            fragment.appendChild(empty);
            continue;
          }

          const btn = document.createElement("button");
          btn.className = `seat ${seat.status}`;
          if (seat.id === selectedSeatId) {
            btn.classList.add("selected");
          }
          btn.innerText = seat.seat_number;
          btn.dataset.seatId = seat.id;

          if (seat.status === "available") {
            btn.addEventListener("click", () => toggleSeatSelection(seat.id));
          } else {
            btn.disabled = true;
          }

          fragment.appendChild(btn);
        }
      }

      return fragment;
    }

    function renderSeats() {
      const sectionA = document.getElementById("sectionA");
      const sectionB = document.getElementById("sectionB");

      sectionA.innerHTML = "";
      sectionB.innerHTML = "";

      sectionA.appendChild(buildSectionLayout("A"));
      sectionB.appendChild(buildSectionLayout("B"));

      updateSelectedMessage();
    }

    function toggleSeatSelection(seatId) {
      if (selectedSeatId === seatId) {
        selectedSeatId = null;
      } else {
        selectedSeatId = seatId;
      }
      renderSeats();
    }

    function updateSelectedMessage() {
      const seatMessage = document.getElementById("seatMessage");
      const completeBtn = document.getElementById("completeBtn");

      if (!selectedSeatId) {
        seatMessage.innerText = "좌석을 1개 선택하세요.";
        completeBtn.disabled = true;
        return;
      }

      const selectedSeat = seatsCache.find((seat) => seat.id === selectedSeatId);
      if (!selectedSeat) {
        seatMessage.innerText = "좌석을 1개 선택하세요.";
        completeBtn.disabled = true;
        return;
      }

      seatMessage.innerText = `${selectedSeat.seat_number}번 좌석 선택됨`;
      completeBtn.disabled = false;
    }

    async function issueAccess(student, seatNumber) {
      const code = Math.floor(1000 + Math.random() * 9000).toString();

      const qrData = {
        student_id: student.id,
        code,
        seat_number: seatNumber
      };

      const qrCanvas = document.getElementById("qr");

      await QRCode.toCanvas(qrCanvas, JSON.stringify(qrData), {
        width: 220,
        margin: 2,
        color: {
          dark: "#000000",
          light: "#ffffff"
        }
      });

      await addDoc(collection(db, "access_codes"), {
        student_id: student.id,
        name: student.name,
        seat_number: seatNumber,
        code,
        qr_data: JSON.stringify(qrData),
        created_at: serverTimestamp(),
        is_used: false
      });

      await addDoc(collection(db, "seat_usage"), {
        student_id: student.id,
        name: student.name,
        seat_number: seatNumber,
        status: "in_use",
        created_at: serverTimestamp()
      });

      document.getElementById("rseat").innerText = `${seatNumber}번 좌석`;
      document.getElementById("rname").innerText = student.name;
      document.getElementById("rcode").innerText = code;
      document.getElementById("result").style.display = "block";
    }

    async function confirmSeatSelection() {
      if (!currentStudent || !selectedSeatId) return;

      const completeBtn = document.getElementById("completeBtn");
      completeBtn.disabled = true;
      completeBtn.innerText = "처리 중...";

      try {
        const selectedSeat = seatsCache.find((seat) => seat.id === selectedSeatId);
        if (!selectedSeat || selectedSeat.status !== "available") {
          alert("선택한 좌석을 사용할 수 없습니다.");
          return;
        }

        const seatRef = doc(db, "seats", selectedSeat.id);
        await updateDoc(seatRef, {
          status: "in_use"
        });

        await issueAccess(currentStudent, selectedSeat.seat_number);

        document.getElementById("seatMessage").innerText =
          `${currentStudent.name} 학생 ${selectedSeat.seat_number}번 좌석 선택 완료`;

        selectedSeatId = null;

        document.getElementById("result").scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      } catch (e) {
        console.error(e);
        alert("좌석 선택 완료 처리 중 오류가 발생했습니다.");
      } finally {
        completeBtn.disabled = false;
        completeBtn.innerText = "좌석 선택 완료";
      }
    }

    function subscribeSeatsRealtime() {
      onSnapshot(collection(db, "seats"), (snapshot) => {
        seatsCache = snapshot.docs
          .map((d) => ({
            id: d.id,
            ...d.data()
          }))
          .sort((a, b) => a.seat_number - b.seat_number);

        if (selectedSeatId) {
          const current = seatsCache.find((seat) => seat.id === selectedSeatId);
          if (!current || current.status !== "available") {
            selectedSeatId = null;
          }
        }

        updateSeatStatsAndRender();
      });
    }

    window.addEventListener("DOMContentLoaded", async () => {
      const nameInput = document.getElementById("name");
      const idInput = document.getElementById("id");
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      const seatSection = document.getElementById("seatSection");
      const completeBtn = document.getElementById("completeBtn");

      await ensureSeatsInitialized();
      subscribeSeatsRealtime();

      btn.addEventListener("click", async () => {
        msg.innerText = "";
        document.getElementById("result").style.display = "none";
        document.getElementById("seatMessage").innerText = "";
        selectedSeatId = null;

        const studentName = nameInput.value.trim();
        const studentId = idInput.value.trim();

        if (!studentName) {
          msg.innerText = "이름을 입력하세요";
          return;
        }

        if (!/^\d{8}$/.test(studentId)) {
          msg.innerText = "학번은 8자리 숫자만 입력 가능합니다";
          return;
        }

        btn.disabled = true;
        btn.innerText = "확인 중...";

        try {
          const q = query(collection(db, "students"), where("name", "==", studentName));
          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            msg.innerText = "학생정보가 조회되지 않습니다";
            return;
          }

          let found = false;
          snapshot.forEach((docSnap) => {
            if (docSnap.id === studentId) {
              found = true;
            }
          });

          if (!found) {
            msg.innerText = "학번이 일치하지 않습니다";
            return;
          }

          currentStudent = {
            id: studentId,
            name: studentName
          };

          document.getElementById("seatStudent").innerText =
            `${studentName} 학생 좌석 선택`;

          seatSection.style.display = "block";
          completeBtn.disabled = true;

          renderSeats();

          seatSection.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        } catch (e) {
          console.error(e);
          msg.innerText = "오류가 발생했습니다";
        } finally {
          btn.disabled = false;
          btn.innerText = "인증하기";
        }
      });

      completeBtn.addEventListener("click", confirmSeatSelection);

      idInput.addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, "").slice(0, 8);
      });
    });
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 24px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.35;
      margin: 0 0 18px;
      word-break: keep-all;
      letter-spacing: -0.3px;
    }

    .status-card,
    .card,
    .seat-card {
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    .status-card {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .status-item {
      text-align: center;
      padding: 12px 8px;
      border-radius: 16px;
      background: #f9fafb;
    }

    .status-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 22px;
      font-weight: 800;
    }

    .field {
      margin-bottom: 12px;
    }

    .input {
      width: 100%;
      height: 58px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 0 16px;
      font-size: 17px;
      outline: none;
      background: #fff;
    }

    .button,
    .complete-button {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 16px;
      background: #000000;
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    .complete-button {
      margin-top: 18px;
    }

    .button:disabled,
    .complete-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin: 16px 2px 0;
      font-size: 15px;
      line-height: 1.5;
      color: #dc2626;
      word-break: keep-all;
    }

    .seat-card {
      display: none;
    }

    .seat-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
      text-align: center;
    }

    .seat-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .section-title {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #374151;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .seat,
    .seat-empty {
      aspect-ratio: 1 / 1;
      border-radius: 12px;
    }

    .seat {
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #ffffff;
      color: #111827;
      transition: transform 0.18s ease, background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .seat.available:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
      border-color: #111827;
    }

    .seat.selected {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #93c5fd;
      transform: scale(1.03);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
    }

    .seat.in_use {
      background: #111827;
      color: #ffffff;
      border-color: #111827;
      cursor: not-allowed;
    }

    .seat-empty {
      background: transparent;
    }

    .seat-message {
      text-align: center;
      margin-top: 14px;
      color: #2563eb;
      font-size: 14px;
      font-weight: 700;
      word-break: keep-all;
    }

    .result {
      display: none;
      text-align: center;
      margin-top: 22px;
      padding-top: 8px;
    }

    .result-seat {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .result-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .result-code {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 18px;
    }

    .qr-box {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #qr {
      width: 220px !important;
      height: 220px !important;
      background: #ffffff;
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 480px) {
      .page {
        padding: 18px 14px 32px;
      }

      .title {
        font-size: 20px;
        margin-bottom: 14px;
      }

      .status-card {
        grid-template-columns: 1fr;
      }

      .seat-layout {
        grid-template-columns: 1fr;
      }

      .card,
      .seat-card,
      .status-card {
        padding: 18px;
        border-radius: 20px;
      }

      .input {
        height: 54px;
        font-size: 16px;
      }

      .button,
      .complete-button {
        height: 54px;
        font-size: 18px;
      }

      .result-code {
        font-size: 40px;
      }

      #qr {
        width: 200px !important;
        height: 200px !important;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="wrap">
      <h1 class="title">순천향대학교 사물인터넷학과 출입 인증 시스템</h1>

      <div class="status-card">
        <div class="status-item">
          <div class="status-label">전체 좌석</div>
          <div class="status-value" id="totalSeats">45석</div>
        </div>
        <div class="status-item">
          <div class="status-label">남은 좌석</div>
          <div class="status-value" id="remainingSeats">-</div>
        </div>
        <div class="status-item">
          <div class="status-label">점유율</div>
          <div class="status-value" id="occupancyRate">-</div>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <input id="name" class="input" placeholder="이름 입력" />
        </div>

        <div class="field">
          <input id="id" class="input" placeholder="학번 (8자리)" inputmode="numeric" />
        </div>

        <button id="btn" class="button">인증하기</button>
        <p id="msg" class="message"></p>
      </div>

      <div class="seat-card" id="seatSection">
        <div class="seat-title" id="seatStudent">좌석 선택</div>

        <div class="seat-layout">
          <div>
            <div class="section-title">A 분단</div>
            <div class="seat-grid" id="sectionA"></div>
          </div>

          <div>
            <div class="section-title">B 분단</div>
            <div class="seat-grid" id="sectionB"></div>
          </div>
        </div>

        <div class="seat-message" id="seatMessage"></div>
        <button id="completeBtn" class="complete-button" disabled>좌석 선택 완료</button>

        <div class="result" id="result">
          <div class="result-seat" id="rseat"></div>
          <div class="result-name" id="rname"></div>
          <div class="result-code" id="rcode"></div>
          <div class="qr-box">
            <canvas id="qr"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
